<div class="detail-container animate-fade-in" *ngIf="!isLoading(); else loadingTemplate">
  <div *ngIf="article(); else notFoundTemplate">
    <a [routerLink]="['/']" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor">
        <path d="M360-240 120-480l240-240 56 56-144 144h568v80H272l144 144-56 56Z"/>
      </svg>
      Voltar para o blog
    </a>

    <div class="article-hero">
      <img class="cover-image" [src]="article()?.coverImage || 'https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=1200'" alt="Cover Image" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="meta-info">
          <span class="meta-item">{{ article()?.createdAt | date:'dd MMMM yyyy' }}</span>
          <span class="meta-divider"></span>
          <span class="meta-item">{{ article()?.readingTime }} min de leitura</span>
        </div>
        <h1 class="article-title">{{ article()?.title }}</h1>
        <div class="tags-row" *ngIf="article()?.tags">
          <span class="tag-badge" *ngFor="let tag of article()?.tags?.split(',')">{{ tag.trim() }}</span>
        </div>
      </div>
    </div>

    <div class="article-body-wrapper glass">
      <div class="article-markdown" [innerHTML]="formattedContent()"></div>
    </div>
  </div>
</div>

<ng-template #notFoundTemplate>
  <div class="error-container glass">
    <svg xmlns="http://www.w3.org/2000/svg" height="48" viewBox="0 -960 960 960" width="48" fill="currentColor">
      <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
    </svg>
    <h2>Artigo não encontrado</h2>
    <p>O artigo que você está procurando não existe ou foi removido.</p>
    <button [routerLink]="['/']" class="btn btn-primary">Voltar para o Início</button>
  </div>
</ng-template>

<ng-template #loadingTemplate>
  <div class="loading-wrapper">
    <div class="skeleton-title"></div>
    <div class="skeleton-image"></div>
    <div class="skeleton-text"></div>
    <div class="skeleton-text sm"></div>
  </div>
</ng-template>
