<header>
  <div class="container nav-container">
    <div class="logo" [routerLink]="['/']">
      DevBlog<span class="logo-dot">.</span>
    </div>
    <nav class="nav-links">
      <a class="nav-link" [routerLink]="['/']" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}">Blog</a>
      <a class="nav-link" [routerLink]="['/admin']" routerLinkActive="active">Painel Admin</a>
      
      <button class="theme-toggle" (click)="toggleTheme()" title="Trocar Tema">
        <!-- Sun Icon (shown in dark theme -> to switch to light) -->
        <svg *ngIf="!isLightTheme()" xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="currentColor">
          <path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-56 96 101-52 52Zm492 496-97-101 53-52 101 97-57 56Zm-99-496 97-101 56 57-101 96-52-52ZM155-211l97-101 52 52-96 101-57-56Z"/>
        </svg>
        <!-- Moon Icon (shown in light theme -> to switch to dark) -->
        <svg *ngIf="isLightTheme()" xmlns="http://www.w3.org/2000/svg" height="22" viewBox="0 -960 960 960" width="22" fill="currentColor">
          <path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q50 0 96.5-24.5T832-534q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q116 0 198-82t82-198q0-10-.5-20t-1.5-20q-29 17-61 25.5t-67 8.5q-125 0-212.5-87.5T230-570q0-35 8.5-67t25.5-61q-10-1-20-1.5t-20-.5q-116 0-198 82t-82 198q0 116 82 198t198 82Zm-10-270Z"/>
        </svg>
      </button>

      <button class="nav-link btn-logout" *ngIf="authService.isAuthenticated()" (click)="logout()">
        Sair
      </button>
    </nav>
  </div>
</header>

<main class="main-content">
  <div class="container">
    <router-outlet></router-outlet>
  </div>
</main>

<footer>
  <div class="container">
    <p>&copy; {{ getCurrentYear }} DevBlog.</p>
  </div>
</footer>
