name: Deploy to HostGator

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Create environment.ts
        run: |
          mkdir -p src/environments
          echo "export const environment = { production: true, adminEmailHash: '${{ secrets.ADMIN_EMAIL_HASH }}', adminPasswordHash: '${{ secrets.ADMIN_PASSWORD_HASH }}' };" > src/environments/environment.ts

      - name: Build Application
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/frontend/browser/
          server-dir: ./
